  - {t: 'Gui+AltGr+$$mdi:keyboard-return$$', type: enter}
  - Ctl+Sft+AltGr+$$mdi:arrow-up-bold$$
combos:
- p: [0, 1]
  k: $$mdi:keyboard-esc$$
- p: [10, 11]
  k: $$mdi:keyboard-tab$$
- p: [17, 16]
  k: {t: '$$mdi:backspace$$', type: backspace}
- p: [11, 12]
  k: $$mdi:apple-keyboard-command$$
- p: [12, 13]
  k: $$mdi:keyboard-space$$
- p: [17, 18]
  k: $$mdi:apple-keyboard-option$$
- p: [18, 19]
  k: RETURN
- p: [20, 21]
  k: {t: Z, h: '$$mdi:apple-keyboard-command$$'}
